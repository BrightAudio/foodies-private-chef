name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npx next build
        env:
          DATABASE_URL: "postgresql://fake:fake@localhost:5432/fake"
          JWT_SECRET: "ci-test-secret"
          SKIP_ENV_VALIDATION: "1"
